<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบริหารจัดการการอบรม (TMS) - V7.0</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Niramit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container mt-5 mb-5">
    
    <div id="loginSection" class="row justify-content-center fade-in">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm text-center p-4 border-0 rounded-4">
          <h4 class="mb-3 text-primary fw-bold">เข้าสู่ระบบ TMS</h4>
          <p class="text-muted small">โครงการประเมินและทดสอบ PISA (V7.0)</p>
          <input type="text" id="personalId" class="form-control text-center mb-3 p-2" placeholder="กรอกรหัสประจำตัว (เช่น SV001)">
          <button class="btn btn-primary w-100 fw-bold p-2" onclick="login()">เข้าสู่ระบบ</button>
        </div>
      </div>
    </div>

    <div id="dashboardSection" class="d-none fade-in">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark mb-0">เมนูหลัก</h3>
        <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">ออกจากระบบ</button>
      </div>
      
      <div class="row g-3">
        <div class="col-6 col-md-3">
          <div class="card menu-card bg-info text-white text-center p-3 h-100 border-0 rounded-4" onclick="openAttendanceForm()">
            <h5 class="fw-bold mt-2">⏱️ ลงเวลา</h5>
            <small>เช็คอินเข้าอบรม</small>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card menu-card bg-warning text-dark text-center p-3 h-100 border-0 rounded-4" onclick="openExamForm()">
            <h5 class="fw-bold mt-2">📝 ทำข้อสอบ</h5>
            <small>Pre-Test / Post-Test</small>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card menu-card bg-success text-white text-center p-3 h-100 border-0 rounded-4" onclick="openSurveyForm('PROJECT_SURVEY')">
            <h5 class="fw-bold mt-2">📊 ประเมิน</h5>
            <small>ภาพรวมโครงการ</small>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card menu-card bg-primary text-white text-center p-3 h-100 border-0 rounded-4" onclick="openSurveyForm('SPEAKER_SURVEY')">
            <h5 class="fw-bold mt-2">🎤 ประเมิน</h5>
            <small>วิทยากรรายบุคคล</small>
          </div>
        </div>
      </div>
    </div>

    <div id="attendanceSection" class="d-none fade-in">
      <div class="card shadow-sm p-4 mx-auto border-0 rounded-4" style="max-width: 500px;">
        <h4 class="mb-4 text-info fw-bold text-center border-bottom pb-2">⏱️ ลงเวลาเข้าอบรม</h4>
        <div id="attendanceButtonsContainer" class="mb-4"></div>
        <div class="d-flex justify-content-center mt-2">
          <button class="btn btn-secondary px-4 w-100 rounded-pill" onclick="backToDashboard('attendanceSection')">กลับเมนูหลัก</button>
        </div>
      </div>
    </div>

    <div id="examSection" class="d-none fade-in">
      <div class="card shadow-sm p-4 mx-auto border-0 rounded-4" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-3">
          <h4 class="text-warning fw-bold mb-0">📝 แบบทดสอบ <span id="examTitleLabel" class="text-dark"></span></h4>
          <div id="examTimerBadge" class="badge bg-danger fs-5 d-none rounded-pill px-3 shadow-sm">⏳ <span id="examTimeDisplay">00:00</span></div>
        </div>
        <div id="examContentArea" class="mt-3"></div>
        <div class="d-flex justify-content-between mt-4 border-top pt-4">
          <button id="btnCancelExam" class="btn btn-secondary px-4 rounded-pill" onclick="backToDashboard('examSection')">กลับเมนูหลัก</button>
          <button id="btnSubmitExam" class="btn btn-warning text-dark fw-bold px-4 d-none rounded-pill shadow-sm" onclick="submitRealExam()">ส่งคำตอบ (ตรวจทันที)</button>
        </div>
      </div>
    </div>

    <div id="surveySection" class="d-none fade-in">
      <div class="card shadow-sm p-4 mx-auto border-0 rounded-4" style="max-width: 800px;">
        <h4 class="text-success fw-bold border-bottom pb-3 mb-4">📊 <span id="surveyTitleLabel">แบบประเมิน</span></h4>
        
        <div id="speakerSelectionArea" class="mb-4 d-none">
          <label class="form-label fw-bold text-primary mb-3">กรุณาเลือกวิทยากรที่ต้องการประเมิน:</label>
          <div id="speakerButtonsGrid" class="row g-3 text-center"></div>
        </div>

        <div id="surveyContentArea" class="mt-3"></div>

        <div class="d-flex justify-content-between mt-4 pt-4 border-top">
          <button class="btn btn-secondary px-4 rounded-pill" onclick="backToDashboard('surveySection')">กลับ</button>
          <button id="btnSubmitSurvey" class="btn btn-success fw-bold px-4 d-none rounded-pill shadow-sm" onclick="submitRealSurvey()">ส่งผลประเมิน</button>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
